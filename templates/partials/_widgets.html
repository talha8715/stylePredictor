<!-- Sidebar Widgets -->
<div class="col-md-4">
    <div class="glass-card my-4">
        <h5 style="font-weight:700;margin-bottom:1rem;"><i class="fas fa-search mr-1"></i> Search</h5>
        <form action="{% url 'post1' %}" method="get">
            <div class="input-group">
                <input type="search" name='q' class="form-control" placeholder="Search posts..." value="{{ request.GET.q }}" required>
                <span class="input-group-btn">
                    <button class="btn btn-primary" type="submit"><i class="fas fa-search"></i></button>
                </span>
            </div>
        </form>
    </div>

    <div class="glass-card my-4">
        <h5 style="font-weight:700;margin-bottom:1rem;"><i class="fas fa-folder mr-1"></i> Categories</h5>
        <div class="row">
            {% for cat in categories %}
            <div class="col-6 mb-2">
                <a href="{% url 'post1' %}?q={{ request.GET.q }}&cat={{ cat }}" style="color:var(--primary-light);font-size:0.9rem;">{{ cat }}</a>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="glass-card my-4">
        <h5 style="font-weight:700;margin-bottom:1rem;"><i class="fas fa-clock mr-1"></i> Recent Posts</h5>
        <ul style="list-style:none;padding:0;margin:0;">
            {% for post in recent_posts %}
            <li style="padding:0.5rem 0;border-bottom:1px solid var(--border);">
                <a href="{{ post.slug }}" style="font-size:0.9rem;">{{ post.title }}</a>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
</div>
